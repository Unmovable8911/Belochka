name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Each binary is built on a native runner so there is no arm64 apt multiarch
  # to wrangle. Only the Windows target cross-compiles (mingw) from amd64.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
            output: belochka-linux-amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            output: belochka-linux-arm64
          - runner: ubuntu-24.04
            goos: windows
            goarch: amd64
            cc: x86_64-w64-mingw32-gcc
            ldextra: ' -H windowsgui'
            output: belochka-windows-amd64.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # CGo dependency for fyne.io/systray. The native (Linux) target needs the
      # appindicator dev package; the Windows cross target needs the mingw gcc
      # (Win32 headers ship with it).
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          if [ "${{ matrix.goos }}" = "windows" ]; then
            sudo apt-get install -y gcc-mingw-w64-x86-64
          else
            sudo apt-get install -y libayatana-appindicator3-dev
          fi

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npx tsc -b
          npx vite build

      - name: Build binary
        env:
          LDFLAGS: -s -w -X main.version=${{ github.ref_name }}
        run: |
          mkdir -p bin
          export CGO_ENABLED=1
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          [ -n "${{ matrix.cc }}" ] && export CC=${{ matrix.cc }}
          go build -ldflags "$LDFLAGS${{ matrix.ldextra }}" -o "bin/${{ matrix.output }}" ./cmd/server/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: bin/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: bin
          merge-multiple: true

      - name: Create checksums
        run: cd bin && sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/belochka-linux-amd64
            bin/belochka-linux-arm64
            bin/belochka-windows-amd64.exe
            bin/checksums.txt
