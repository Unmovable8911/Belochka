name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Install system libraries needed for CGo (fyne.io/systray):
      #   amd64 native build    — libayatana-appindicator3-dev
      #   arm64 cross build     — libayatana-appindicator3-dev:arm64 + gcc-aarch64-linux-gnu
      #   windows cross build   — gcc-mingw-w64-x86-64 (Win32 headers bundled with MinGW)
      - name: Set up arm64 apt sources
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb http/deb [arch=amd64] http/' /etc/apt/sources.list
          sudo sed -i 's/^deb mirror/deb [arch=amd64] mirror/' /etc/apt/sources.list || true
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs) main restricted universe multiverse" \
            | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-updates main restricted universe multiverse" \
            | sudo tee -a /etc/apt/sources.list.d/arm64.list

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libayatana-appindicator3-dev:arm64 \
            gcc-aarch64-linux-gnu \
            gcc-mingw-w64-x86-64

      # Frontend build split into discrete steps so failures are obvious
      # in the job summary without digging through logs.
      - name: Install frontend deps
        working-directory: web
        run: npm ci

      - name: Type-check frontend
        working-directory: web
        run: npx tsc -b

      - name: Bundle frontend
        working-directory: web
        run: npx vite build

      - name: Build binaries
        env:
          LDFLAGS: -s -w -X main.version=${{ github.ref_name }}
        run: |
          mkdir -p bin

          CGO_ENABLED=1 \
          GOOS=linux GOARCH=amd64 \
          go build -ldflags "$LDFLAGS" -o bin/belochka-linux-amd64 ./cmd/server/

          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig \
          CC=aarch64-linux-gnu-gcc \
          CGO_ENABLED=1 \
          GOOS=linux GOARCH=arm64 \
          go build -ldflags "$LDFLAGS" -o bin/belochka-linux-arm64 ./cmd/server/

          CC=x86_64-w64-mingw32-gcc \
          CGO_ENABLED=1 \
          GOOS=windows GOARCH=amd64 \
          go build -ldflags "$LDFLAGS -H windowsgui" -o bin/belochka-windows-amd64.exe ./cmd/server/

      - name: Create checksums
        run: cd bin && sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/belochka-linux-amd64
            bin/belochka-linux-arm64
            bin/belochka-windows-amd64.exe
            bin/checksums.txt
