name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # The embedded React bundle is platform-independent, so build it once and share
  # web/dist with every build job. This keeps npm to a single point of failure
  # instead of one per target.
  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npx tsc -b
          npx vite build

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist

  # fyne.io/systray's Linux backend talks D-Bus and its Windows backend uses
  # the Win32 API, both pure Go — so every target cross-compiles from a single
  # ubuntu runner with CGO disabled, with no apt packages or mingw to wrangle.
  build:
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: belochka-linux-amd64
          - goos: linux
            goarch: arm64
            output: belochka-linux-arm64
          - goos: windows
            goarch: amd64
            ldextra: ' -H windowsgui'
            output: belochka-windows-x86-64.exe
          - goos: windows
            goarch: '386'
            ldextra: ' -H windowsgui'
            output: belochka-windows-x86.exe
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Build binary
        env:
          LDFLAGS: -s -w -X main.version=${{ github.ref_name }}
        run: |
          mkdir -p bin
          export CGO_ENABLED=0
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          go build -ldflags "$LDFLAGS${{ matrix.ldextra }}" -o "bin/${{ matrix.output }}" ./cmd/server/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: bin/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: bin
          pattern: belochka-*
          merge-multiple: true

      - name: Create checksums
        run: cd bin && sha256sum * > checksums.txt

      # Releases are cut from direct pushes to main (no PRs), so GitHub's
      # auto-generated PR notes are empty. Build the body from the commit log
      # between the previous tag and this one instead.
      - name: Generate changelog
        run: |
          tag="${{ github.ref_name }}"
          prev="$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)"
          {
            echo "## Changes"
            echo
            if [ -n "$prev" ]; then
              git log --no-merges --pretty='- %s' "${prev}..${tag}"
              echo
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${prev}...${tag}"
            else
              git log --no-merges --pretty='- %s' "${tag}"
            fi
          } > CHANGELOG_RELEASE.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_RELEASE.md
          files: |
            bin/belochka-linux-amd64
            bin/belochka-linux-arm64
            bin/belochka-windows-x86-64.exe
            bin/belochka-windows-x86.exe
            bin/checksums.txt
