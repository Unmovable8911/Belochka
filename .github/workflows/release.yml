name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Frontend build is split into discrete steps so that, if anything
      # fails, the failing command is obvious from the job summary alone
      # (no need to dig through logs).
      - name: Install frontend deps
        working-directory: web
        run: npm ci

      - name: Type-check frontend
        working-directory: web
        run: npx tsc -b

      - name: Bundle frontend
        working-directory: web
        run: npx vite build

      - name: Build binaries
        env:
          LDFLAGS: -s -w -X main.version=${{ github.ref_name }}
        run: |
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o bin/belochka-linux-amd64       ./cmd/server/
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o bin/belochka-linux-arm64       ./cmd/server/
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o bin/belochka-windows-amd64.exe ./cmd/server/

      - name: Create checksums
        run: cd bin && sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/belochka-linux-amd64
            bin/belochka-linux-arm64
            bin/belochka-windows-amd64.exe
            bin/checksums.txt
